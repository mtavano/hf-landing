server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak nginx version
    server_tokens off;

    # Security headers — set at server scope. We use the `expires` directive
    # (not `add_header Cache-Control`) for caching below, so these are not
    # clobbered by location-level add_header inheritance rules.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Hashed build assets are immutable — cache for a year
    location /assets/ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # SVG favicon
    location = /favicon.svg {
        expires 7d;
    }

    # index.html must never be cached so deploys take effect immediately
    location = /index.html {
        expires -1;
    }

    # SPA history fallback — every route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
